<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Thiết Kế Form</title>
  <link rel="stylesheet" href="../css/style4.css">
   <style>
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #eee;
    }
  </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="../index.html">Trang Chủ</a></li>
            <li><a href="page1.html">Thong Tin Ca Nhan</a></li>
            <li><a href="page2.html">Đăng Nhập</a></li>
            <li><a href="page3.html">Phiếu Đăng Ký CLB</a></li>
            <li><a href="page4.html">Xuất Hóa Đơn</a></li>
            <li><a href="page5.html">Bảng Cửu Chương</a></li>
        </ul>
    </nav>
  <h1>xuất hóa Đơn</h1>
  <table>
    <tr>
      <th>SanPham</th>
      <th>SoLuong</th>
      <th>DonGia</th>
      <th>ThanhTien</th>
    </tr>
    <tr>
      <td>ip17promax</td>
      <td class="sl">4</td>
      <td class="dg">50.000.000</td>
      <td class="tt"></td>
    </tr>
    <tr>
      <td>ip16promax</td>
      <td class="sl">3</td>
      <td class="dg">30.000.000</td>
      <td class="tt"></td>
    </tr>
    <tr>
      <td>ip15promax</td>
      <td class="sl">3</td>
      <td class="dg">10.000.000</td>
      <td class="tt"></td>
    </tr>
    <tr>
      <th colspan="3">Tổng Thanh Toán</th>
      <th id="tong"></th>
    </tr>
  </table>

  <script>
    const DonGia = document.getElementsByClassName("dg");
    const SoLuong = document.getElementsByClassName("sl");
    const ThanhTien = document.getElementsByClassName("tt");
    let tong = 0;

    function parseNumber(text) {
      return Number(text.replace(/\./g, ""));
    }

    function formatNumber(value) {
      return value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    for (let i = 0; i < SoLuong.length; i++) {
      const sl = parseInt(SoLuong[i].textContent.trim(), 10);
      const dg = parseNumber(DonGia[i].textContent.trim());
      const tt = sl * dg;
      ThanhTien[i].textContent = formatNumber(tt);
      tong += tt;
    }

    document.getElementById("tong").textContent = formatNumber(tong);
  </script>
</body>
</html>
