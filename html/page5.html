<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Bảng Cửu Chương</title>
  <link rel="stylesheet" href="../css/style4.css">
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #eee;
    }
    input {
      padding: 8px;
      width: 100px;
    }
    button {
      padding: 8px 20px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="../index.html">Trang Chủ</a></li>
      <li><a href="page1.html">Thong Tin Ca Nhan</a></li>

      <li><a href="page5.html">Bảng Cửu Chương</a></li>
    </ul>
  </nav>

  <h1>Bảng Cửu Chương</h1>
  
  <form id="formbangcuuchuong">
    <label for="txtNumber">Nhập số (1-9):</label>
    <input type="number" id="txtNumber" min="1" max="9" value="5">
    <button type="button" onclick="generateTable()">Tạo Bảng</button>
  </form>

  <table id="tableResult">
    <tr>
      <th>Số</th>
      <th>x</th>
      <th>Kết quả</th>
    </tr>
  </table>

  <script>
    function generateTable() {
      const number = parseInt(document.getElementById("txtNumber").value);
      const table = document.getElementById("tableResult");
      
      // Xóa các hàng cũ (giữ lại header)
      while (table.rows.length > 1) {
        table.deleteRow(1);
      }

      // Tạo bảng cửu chương
      for (let i = 1; i <= 10; i++) {
        const row = table.insertRow();
        const cell1 = row.insertCell(0);
        const cell2 = row.insertCell(1);
        const cell3 = row.insertCell(2);
        
        cell1.textContent = number;
        cell2.textContent = i;
        cell3.textContent = number * i;
      }
    }
    fu

    // Tạo bảng khi trang load
    generateTable();
  </script>
</body>
</html>
